<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dashboard — Computação em Nuvem</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/sobre.css" />
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  </head>
  <body>

    <header class="site-header">
      <strong>Computação em Nuvem</strong>
      <nav class="nav-menu" id="navMenu">
        <button class="nav-trigger" aria-haspopup="true" aria-expanded="false" onclick="toggleNav()">
          Páginas <i class="chevron">▾</i>
        </button>
        <div class="nav-dropdown" role="menu">
          <a href="index.html" role="menuitem">🏠 Início</a>
          <a href="gerenciar.html" class="active" role="menuitem">📊 Dashboard</a>
        </div>
      </nav>
    </header>

    <main>
      <div class="panel">

        <div class="panel-head">
          <span class="panel-title">📊 Registros</span>
          <button class="btn-upload" onclick="document.getElementById('fileInput').click()">
            ↑ Selecionar .xlsx
          </button>
          <input type="file" id="fileInput" accept=".xlsx" />
          <button class="btn-sample" onclick="loadSample()">Dados de exemplo</button>
        </div>

        <div class="filters-row">
          <span class="filter-label">Filtros</span>
          <input class="filter-input" id="filterName" type="text" placeholder="Nome"   oninput="applyFilters()" />
          <input class="filter-input" id="filterCity" type="text" placeholder="Cidade" oninput="applyFilters()" />
          <input class="filter-input" id="filterID"   type="text" placeholder="ID"     oninput="applyFilters()" />
        </div>

        <div class="stats-strip" id="statsBar">
          Exibindo <b id="countVisible">0</b> de <b id="countTotal">0</b> registros
        </div>

        <div class="panel-body" id="content">
          <div class="empty-state">
            <div class="icon">📂</div>
            <p>Selecione um arquivo <strong>.xlsx</strong> ou clique em "Dados de exemplo" para começar.</p>
          </div>
        </div>

      </div>
    </main>

    <footer class="site-footer">© 2026</footer>

    <script src="../js/nav.js"></script>
    <script src="../js/dashboard.js"></script>
  </body>
</html>
